<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        main {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

    <header>
        <h1>Retailer</h1>
    </header>

    <main>
        <h2>Retailer</h2>
        <form action="#" method="post">
            <label for="retailerId">Retailer ID:</label>
            <input type="text" id="retailerId" name="retailerId" placeholder="Enter Retailer ID" required>

            <label for="name">Retailer Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter Retailer Name" required>

            <label for="shopLocation">Shop Location:</label>
            <textarea id="shopLocation" name="shopLocation" placeholder="Enter Shop Location" required></textarea>

            <button type="submit">Save Retailer</button>
        </form>
    </main>

</body>
</html>
